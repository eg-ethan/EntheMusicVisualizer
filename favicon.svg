<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b48bff"/>
      <stop offset="100%" stop-color="#62e6c9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b48bff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b48bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- dark background -->
  <rect width="32" height="32" rx="7" fill="#05060a"/>
  <!-- glow -->
  <circle cx="16" cy="16" r="16" fill="url(#glow)"/>
  <!-- E letterform built from gradient bars -->
  <rect x="8"  y="7"  width="16" height="3"  rx="1.5" fill="url(#g)"/>
  <rect x="8"  y="14.5" width="12" height="3" rx="1.5" fill="url(#g)"/>
  <rect x="8"  y="22" width="16" height="3"  rx="1.5" fill="url(#g)"/>
  <rect x="8"  y="7"  width="3"  height="18" rx="1.5" fill="url(#g)"/>
</svg>
